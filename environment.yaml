name: pointsdf

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ────────────────────────────────────────────────────────────────
  - python=3.12.3

  # ── C/C++ compiler ────────────────────────────────────────────────────────
  # Required to build pytorch_fpsample (and any other C++/OpenMP extension)
  # from source. Not pre-installed on the GPU cluster; conda-forge ships a
  # self-contained GCC toolchain that does not need sudo.
  - conda-forge::gcc_linux-64   # sets CC / activates GCC in the env
  - conda-forge::gxx_linux-64   # sets CXX / activates G++ in the env
  - conda-forge::make

  # ── Core scientific stack (installed from conda for fast dependency solve) ─
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - scikit-image       # marching cubes (skimage.measure.marching_cubes)
  - matplotlib
  - tqdm
  - pyyaml
  - plyfile            # read/write .ply point clouds without Open3D

  # ── pip-installed packages ─────────────────────────────────────────────────
  - pip
  - pip:
    # PyTorch 2.8.0 + CUDA 12.8
    # Matches INSTALL.md: torch==2.8, torchvision==0.23.0, CUDA 12.8
    - --extra-index-url https://download.pytorch.org/whl/cu128
    - torch==2.8.0
    - torchvision==0.23.0

    # PyTorch Geometric 2.7.0
    # Matches INSTALL.md: torch_geometric==2.7.0
    - torch_geometric==2.7.0

    # PyG extension wheels — exact cp312 Linux builds for torch-2.8+cu128
    # Source: https://data.pyg.org/whl/torch-2.8.0+cu128.html
    - https://data.pyg.org/whl/torch-2.8.0%2Bcu128/torch_cluster-1.6.3%2Bpt28cu128-cp312-cp312-linux_x86_64.whl
    - https://data.pyg.org/whl/torch-2.8.0%2Bcu128/torch_scatter-2.1.2%2Bpt28cu128-cp312-cp312-linux_x86_64.whl
    - https://data.pyg.org/whl/torch-2.8.0%2Bcu128/torch_sparse-0.6.18%2Bpt28cu128-cp312-cp312-linux_x86_64.whl
    - https://data.pyg.org/whl/torch-2.8.0%2Bcu128/torch_spline_conv-1.2.2%2Bpt28cu128-cp312-cp312-linux_x86_64.whl
    - https://data.pyg.org/whl/torch-2.8.0%2Bcu128/pyg_lib-0.6.0%2Bpt28cu128-cp312-cp312-linux_x86_64.whl

    # Point cloud I/O and visualisation
    # Matches INSTALL.md: open3d==0.19.0
    - open3d==0.19.0

    # Computer vision
    # Matches INSTALL.md: opencv-python==4.12.0.88
    - opencv-python==4.12.0.88

    # Hyperparameter search
    # Matches INSTALL.md: optuna==4.6.0
    - optuna==4.6.0

    # Mesh processing and SDF extraction (needed for DeepSDF data pipeline)
    - trimesh
    - point-cloud-utils   # pcu: signed_distance_to_mesh for SDF sample generation

    # Experiment logging
    - tensorboard
    - --no-deps ./pytorch_fpsample
