name: pointsdf

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ────────────────────────────────────────────────────────────────
  - python=3.12.3

  # ── C/C++ compiler ────────────────────────────────────────────────────────
  # Required to build pytorch_fpsample (and any other C++/OpenMP extension)
  # from source. Not pre-installed on the GPU cluster; conda-forge ships a
  # self-contained GCC toolchain that does not need sudo.
  - conda-forge::gcc_linux-64   # sets CC / activates GCC in the env
  - conda-forge::gxx_linux-64   # sets CXX / activates G++ in the env
  - conda-forge::make

  # ── Core scientific stack (installed from conda for fast dependency solve) ─
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - scikit-image       # optional fallback for SDF visualisation; primary mesh extraction uses convex hull
  - matplotlib
  - tqdm
  - pyyaml

  # ── pip-installed packages ─────────────────────────────────────────────────
  - pip
  - pip:
    # PyTorch 2.8.0 + CUDA 12.8
    # Matches INSTALL.md: torch==2.8, torchvision==0.23.0, CUDA 12.8
    - --extra-index-url https://download.pytorch.org/whl/cu128
    - torch==2.8.0
    - torchvision==0.23.0

    # PyTorch Geometric 2.7.0 + required extension wheels (cp312, linux, pt28+cu128)
    # Matches INSTALL.md: torch_geometric==2.7.0
    # Source: https://data.pyg.org/whl/torch-2.8.0+cu128.html
    - torch_geometric==2.7.0
    - --find-links https://data.pyg.org/whl/torch-2.8.0+cu128.html
    - torch_cluster==1.6.3
    - torch_scatter==2.1.2
    - torch_sparse==0.6.18
    - torch_spline_conv==1.2.2

    # Point cloud I/O, visualisation, and GPU-accelerated convex hull for volume extraction.
    # Requires glibc >= 2.28 (manylinux_2_28 wheel). Ubuntu 20.04+ and most 2022+
    # HPC nodes satisfy this. Run `ldd --version` to confirm before creating the env.
    - open3d==0.19.0

    # Computer vision
    # Matches INSTALL.md: opencv-python==4.12.0.88
    - opencv-python==4.12.0.88

    # Hyperparameter search
    # Matches INSTALL.md: optuna==4.6.0
    - optuna==4.6.0

    # Mesh processing and SDF extraction (needed for DeepSDF data pipeline)
    - trimesh
    - point-cloud-utils   # pcu: signed_distance_to_mesh for SDF sample generation

    # Experiment logging
    - tensorboard

    # NOTE: pytorch_fpsample must be installed manually after activating this
    # environment. See INSTALL.md for instructions:
    #   cd pytorch_fpsample && pip install --no-deps --no-build-isolation .
