name: pointsdf

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ────────────────────────────────────────────────────────────────
  # Downgraded from 3.12 to 3.10 to match the PyG + torch CUDA extension
  # wheels that were built with manylinux_2_28 (glibc >= 2.28 sufficient).
  # PyG extension wheels for PyTorch 2.8 require glibc 2.32; wheels for
  # PyTorch 2.1 (cu121) were built on the older toolchain and work on 2.28.
  - python=3.10

  # ── C/C++ compiler ────────────────────────────────────────────────────────
  # Required to build pytorch_fpsample (and any other C++/OpenMP extension)
  # from source. Not pre-installed on the GPU cluster; conda-forge ships a
  # self-contained GCC toolchain that does not need sudo.
  - conda-forge::gcc_linux-64   # sets CC / activates GCC in the env
  - conda-forge::gxx_linux-64   # sets CXX / activates G++ in the env
  - conda-forge::make

  # ── Core scientific stack (installed from conda for fast dependency solve) ─
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - scikit-image       # optional fallback for SDF visualisation; primary mesh extraction uses convex hull
  - matplotlib
  - tqdm
  - pyyaml

  # ── Open3D via conda-forge (CPU-only build; CUDA not required — hull runs on CPU) ─
  # pip open3d wheels are unavailable on this cluster (no PyPI access).
  # Convex hull in sdf2mesh uses all interior grid points (CPU; matches corepp).
  - conda-forge::open3d>=0.18

  # ── pip-installed packages ─────────────────────────────────────────────────
  - pip
  - pip:
    # PyTorch 2.1.0 + CUDA 12.1
    # Extension wheels for this version were built with manylinux_2_28
    # toolchain — compatible with glibc 2.28 (unlike 2.8.0+cu128 wheels
    # which require glibc 2.32).
    - --extra-index-url https://download.pytorch.org/whl/cu121
    - torch==2.1.0
    - torchvision==0.16.0

    # PyTorch Geometric 2.7.0 + required extension wheels (cp310, linux, pt21+cu121)
    # Source: https://data.pyg.org/whl/torch-2.1.0+cu121.html
    - torch_geometric==2.7.0
    - --find-links https://data.pyg.org/whl/torch-2.1.0+cu121.html
    - torch_cluster==1.6.3
    - torch_scatter==2.1.2
    - torch_sparse==0.6.18
    - torch_spline_conv==1.2.2

    # Computer vision (4.8.x confirmed working on Python 3.10 — corepp stack)
    - opencv-python==4.8.1.78

    # Mesh processing and SDF extraction (needed for DeepSDF data pipeline)
    - trimesh
    - point-cloud-utils   # pcu: signed_distance_to_mesh for SDF sample generation

    # Pin build tools to versions compatible with pytorch_fpsample's setup.py.
    # setuptools>=80 removed pkg_resources from torch.utils.cpp_extension path;
    # numpy>=2 breaks torch 2.x imports during the build metadata step.
    - "setuptools<80"
    - "numpy<2"

    # NOTE: pytorch_fpsample must be installed manually after activating this
    # environment. The pyproject.toml pins torch==2.8 but --no-deps bypasses
    # that check; the extension builds against whatever torch is active.
    # See INSTALL.md for instructions:
    #   cd pytorch_fpsample && pip install --no-deps --no-build-isolation .
