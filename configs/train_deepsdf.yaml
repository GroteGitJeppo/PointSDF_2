# ============================================================
# Stage 1 config: DeepSDF autodecoder (PointSDF_2)
# Update paths to match your server layout.
# ============================================================

# ---- Data --------------------------------------------------
# samples.npz: <sdf_data_dir>/<label>/laser/samples.npz or .../<label>/samples.npz
sdf_data_dir: data/3DPotatoTwin/sdfsamples/potato
splits_csv:   data/3DPotatoTwin/splits.csv

# Labels from these splits get Stage 1 latents (test excluded for holdout).
stage1_splits: [train, val]

# Random SDF points drawn per shape per optimiser step (samples_per_scene).
samples_per_scene: 16384
# Split one shape's samples into this many chunks before one backward (memory).
batch_split: 1

# ---- Output ------------------------------------------------
output_dir: weights/deepsdf

# ---- Architecture (must match Stage 2 decoder_config) -----
latent_size:       32
num_layers:        8
inner_dim:         256
skip_connections:  true

# ---- Training ----------------------------------------------
seed:              42
epochs:            5000
# Per-epoch progress bar over shapes (tqdm); false = plain loop / quieter logs
tqdm:              true
loss_multiplier:   1.0
clamp:             true
clamp_value:       0.1

# Latent L2 / sphere regularisation (ramped over reg_ramp_epochs)
code_regularization:         true
code_regularization_sphere:  false
code_regularization_lambda:  0.0001
reg_ramp_epochs:             100

# nn.Embedding init: N(0, code_init_std_dev / sqrt(latent_size))
code_init_std_dev: 1.0
# If set, Embedding max_norm (L2); omit or null for no bound
code_bound: null

# Optional gradient clip (L2 norm); null to disable
gradient_clip_norm: null

# ---- Learning rates (two entries: decoder, then latents) ---
# Types: Constant | Step | Warmup
learning_rate_schedule:
  - Type: Constant
    Value: 0.0001
  - Type: Constant
    Value: 0.001

# ---- Checkpoints -------------------------------------------
# Save full run under snapshots/<epoch>/ every N epochs (0 = disable)
snapshot_frequency: 10
# Overwrite latest/ every N epochs for resume (0 = disable)
log_frequency:      10

# ---- Resume ------------------------------------------------
pretrained:   false
pretrain_dir: ''   # folder containing decoder.pth, latent_embedding.pt, optimizer.pt, meta.pt
